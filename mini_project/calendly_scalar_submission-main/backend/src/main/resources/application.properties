# Server Configuration
server.port=8081
server.address=0.0.0.0

# Application Configuration
spring.application.name=calendar-backend

# Environment Variables
gemini.api.key=${GEMINI_API_KEY:MY_GEMINI_API_KEY}
app.url=${APP_URL:http://localhost:8081}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.security.enabled=false
spring.security.enabled=false

# Static Resources Configuration
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,file:./dist/
spring.web.resources.add-mappings=true

# Security - Disable default security (no authentication required)
spring.security.user.name=admin
spring.security.user.password=admin
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

# Logging
logging.level.root=INFO
logging.level.com.calendar=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS Configuration
cors.allowed.origins=http://localhost:3000,http://localhost:5173,http://localhost:8081,${APP_URL:http://localhost:8081}
